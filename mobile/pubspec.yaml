name: heatmapper
description: "Wireless HeatMapper — App móvil Android para relevamiento y análisis de cobertura WiFi. Bulldog Tech. / UAGRM FICCT Grupo 24."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Estado y arquitectura
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Cliente HTTP REST (modalidad 100 % en línea)
  dio: ^5.8.0+1

  # Seguridad de sesión (JWT + preferencias mínimas)
  flutter_secure_storage: ^10.0.0

  # Navegación
  go_router: ^17.2.2

  # Importación de archivos
  file_picker: ^11.0.2

  # Renderizado PDF
  pdfx: ^2.9.0

  # Formularios con validación (Sp1-17)
  flutter_form_builder: ^10.3.0+2

  # Monitor de conectividad proactivo (Sp1-20)
  connectivity_plus: ^7.1.1

  # Inyección de dependencias
  get_it: ^9.2.1

  # Iconos Material
  cupertino_icons: ^1.0.8

  # Tipografía custom (Poppins títulos + Inter cuerpo)
  google_fonts: ^6.2.1

  # Escaneo WiFi Android (Sprint 3 — PB-03)
  wifi_scan: ^0.4.1

  # Permisos en tiempo de ejecución (Sprint 3 — ACCESS_FINE_LOCATION)
  permission_handler: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - img/logo.png

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
